# ==============================================
# SERVER CONFIGURATION
# ==============================================
server.port=8080
spring.application.name=resume-ai-backend

# ==============================================
# DATABASE CONFIGURATION
# ==============================================
# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/resume_ai_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=astha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration (optional but recommended)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ==============================================
# JPA / HIBERNATE CONFIGURATION
# ==============================================
# DDL Auto: create, create-drop, update, validate, none
# update - updates schema, preserves data (good for development)
# validate - only validates schema, doesn't change it (good for production)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL queries nicely
spring.jpa.properties.hibernate.format_sql=true

# SQL Dialect for MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Enable SQL comments
spring.jpa.properties.hibernate.use_sql_comments=true

# ==============================================
# JWT CONFIGURATION
# ==============================================
# Secret key for JWT token generation (keep this secure in production)
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024

# Token expiration time in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000

# ==============================================
# OLLAMA AI CONFIGURATION (Your existing config)
# ==============================================
# Ollama base URL (local installation)
spring.ai.ollama.base-url=http://localhost:11434

# Ollama model configuration
spring.ai.ollama.chat.options.model=deepseek-r1:1.5b

# Optional: Additional Ollama settings
# spring.ai.ollama.chat.options.temperature=0.7
# spring.ai.ollama.chat.options.top_p=0.9

# ==============================================
# LOGGING CONFIGURATION
# ==============================================
# Show Spring Security logs (helpful for debugging auth issues)
logging.level.org.springframework.security=DEBUG

# Show your application logs
logging.level.com.resume.backend=DEBUG

# Show SQL parameters in logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==============================================
# CORS CONFIGURATION (if needed for frontend)
# ==============================================
# Allow frontend (React) to access the API
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
# Enable detailed security logging
logging.level.org.springframework.security=DEBUG
logging.level.com.resume.backend.config=DEBUG